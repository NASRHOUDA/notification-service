apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: taskmanager
  labels:
    app: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5004"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: notification-service
        image: houdanasr/notification-service:17
        ports:
        - containerPort: 5004
        env:
        - name: PORT
          value: "5004"
        - name: GATEWAY_URL
          value: "http://api-gateway-service:5000"
        - name: EMAIL_USER
          valueFrom:
            secretKeyRef:
              name: notification-service-secrets
              key: EMAIL_USER
        - name: EMAIL_APP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: notification-service-secrets
              key: EMAIL_APP_PASSWORD
        - name: INTERNAL_API_KEY
          valueFrom:
            secretKeyRef:
              name: notification-service-secrets
              key: INTERNAL_API_KEY
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5004
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5004
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        startupProbe:
          httpGet:
            path: /health
            port: 5004
          failureThreshold: 12
          periodSeconds: 10
